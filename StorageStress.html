<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storage Stress Test</title>
    <style>
        body {
            background-color: #fefefe;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        #status {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff5252;
            margin-bottom: 40px;
            height: 24px;
        }
        button {
            background-color: #6200ea;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 15px rgba(98, 0, 234, 0.4);
            text-transform: uppercase;
        }
        button:hover {
            background-color: #7c4dff;
            box-shadow: 0 6px 20px rgba(124, 77, 255, 0.6);
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(98, 0, 234, 0.4);
        }
        .disclaimer {
            margin-top: 50px;
            padding: 15px 20px;
            background-color: rgba(255, 82, 82, 0.1);
            border-left: 4px solid #ff5252;
            max-width: 450px;
            font-size: 0.95rem;
            line-height: 1.5;
            border-radius: 0 8px 8px 0;
        }
    </style>
</head>
<body>
    <p id="status">Status: Ready</p>
    <button onclick="launchStressTest()">Start Test</button>

    <script>
        let workerWindow = null;

        function launchStressTest() {
            for (let i = 0; i < 4; i++) {
    window.open('annoying.html', 'annoying.html', 'width=100,height=100');
}
            document.getElementById('status').innerText = "Status: Stress Test Running...";
        }

        window.onbeforeunload = function() {
            if (workerWindow && !workerWindow.closed) {
                workerWindow.close();
            }
        };
    </script>

</body>
</html>
