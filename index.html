<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History & Favicon Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 text-center">
        <div class="mb-6">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">History & Favicon Lab</h1>
            <p class="text-gray-600 mt-2">This tool tests how Chrome handles dynamic titles and favicons in the browser history via a popup.</p>
        </div>

        <button id="startBtn" class="w-full py-4 px-6 gradient-bg text-white font-bold rounded-xl shadow-lg hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
            <span>Launch Popup Test</span>
        </button>

        <div id="status" class="mt-6 text-sm font-medium text-gray-500 hidden italic">
            Popup active... Processing cycles...
        </div>
        
        <div class="mt-8 p-4 bg-amber-50 rounded-lg border border-amber-200 text-left">
            <p class="text-xs text-amber-800 leading-relaxed">
                <strong>Note:</strong> Most browsers block popups by default. Please allow popups for this site if the window doesn't appear.
            </p>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const statusDiv = document.getElementById('status');

        function generateFavicon(color) {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
          
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.roundRect(0, 0, 32, 32, 8);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(16, 16, 4, 0, Math.PI * 2);
            ctx.fill();
            
            return canvas.toDataURL('image/png');
        }

        const testData = [
            { title: "Crimson State", color: "#e11d48" },
            { title: "Emerald State", color: "#10b981" },
            { title: "Azure State", color: "#3b82f6" },
            { title: "Amber State", color: "#f59e0b" },
            { title: "Violet State", color: "#8b5cf6" }
        ];

        startBtn.addEventListener('click', () => {
            const popup = window.open('', 'HistoryTestPopup', 'width=400,height=400');
            
            if (!popup) {
                alert("Popup blocked! Please enable popups and try again.");
                return;
            }

            statusDiv.classList.remove('hidden');
            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');

            popup.document.write(`
                <html>
                    <head>
                        <title>Initializing...</title>
                        <link id="dynamic-favicon" rel="icon" type="image/png" href="">
                        <style>
                            body { 
                                font-family: system-ui, sans-serif; 
                                display: flex; 
                                flex-direction: column;
                                align-items: center; 
                                justify-content: center; 
                                height: 100vh; 
                                margin: 0; 
                                transition: background 0.5s;
                                color: white;
                                text-shadow: 0 1px 2px rgba(0,0,0,0.2);
                            }
                            h1 { font-size: 2rem; margin-bottom: 0.5rem; }
                            p { font-size: 1.2rem; opacity: 0.9; }
                        </style>
                    </head>
                    <body>
                        <h1 id="pop-title">Starting...</h1>
                        <p id="pop-step">Step 0/5</p>
                    </body>
                </html>
            `);

            let step = 0;
            const interval = setInterval(() => {
                if (step >= testData.length) {
                    clearInterval(interval);
                    popup.document.getElementById('pop-title').innerText = "Test Complete";
                    popup.document.getElementById('pop-step').innerText = "Closing window...";
                    
                    setTimeout(() => {
                        popup.close();
                        statusDiv.innerText = "Test complete. Check your browser history!";
                        startBtn.disabled = false;
                        startBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    }, 1500);
                    return;
                }

                const current = testData[step];
                const iconData = generateFavicon(current.color);

                popup.document.title = current.title;
                const link = popup.document.getElementById('dynamic-favicon');
                link.href = iconData;
                
                popup.document.body.style.backgroundColor = current.color;
                popup.document.getElementById('pop-title').innerText = current.title;
                popup.document.getElementById('pop-step').innerText = `Step ${step + 1} of 5`;

                popup.history.pushState({ step: step }, current.title, `?step=${step + 1}`);

                step++;
            }, 1000);
        });
    </script>
</body>
</html>
